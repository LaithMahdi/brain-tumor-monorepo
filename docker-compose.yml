services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    expose:
      - "8000"            # internal only — frontend proxies via Nginx
    environment:
      TF_ENABLE_ONEDNN_OPTS: "0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # TF model loading takes ~15-20 s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "80:80"           # Nginx serves the React app and proxies /api → backend
    depends_on:
      backend:
        condition: service_healthy
