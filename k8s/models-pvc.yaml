apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: models-pvc
  namespace: tumor-classifier
spec:
  # GKE standard storage class — ReadWriteOnce is sufficient (one node writes, many read).
  accessModes:
    - ReadOnlyMany
  storageClassName: standard
  resources:
    requests:
      storage: 2Gi    # cnn (~64 MB) + resnet (~94 MB) + mlp (~884 MB) + headroom
