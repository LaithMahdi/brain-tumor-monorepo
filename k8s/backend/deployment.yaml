apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: tumor-classifier
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0      # zero-downtime rollout
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # Replace YOUR_PROJECT_ID with your GCP project ID.
          image: gcr.io/YOUR_PROJECT_ID/brain-tumor-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: TF_ENABLE_ONEDNN_OPTS
              value: "0"
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"   # TF + 3 models need ~2 GB at startup
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 40   # wait for TF model loading
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: models
              mountPath: /app/saved_models
              readOnly: true
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: models-pvc
