services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # live-reload: code changes reflect immediately
    environment:
      TF_ENABLE_ONEDNN_OPTS: "0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src  # live-reload: UI changes reflect immediately
    environment:
      VITE_BACKEND_URL: "http://backend:8000"
    depends_on:
      - backend
